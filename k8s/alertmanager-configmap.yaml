apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_from: ${ALERT_EMAIL_FROM}
      smtp_smarthost: ${ALERT_EMAIL_SMARTHOST}
      smtp_auth_username: ${ALERT_EMAIL_AUTH_USERNAME}
      smtp_auth_password: ${ALERT_EMAIL_AUTH_PASSWORD}
      smtp_require_tls: true

    route:
      receiver: slack-default
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      routes:
        - matchers:
            - environment!="production"
          receiver: slack-default

        - matchers:
            - environment="production"
            - service="backend"
            - severity="critical"
          receiver: pagerduty-critical

        - matchers:
            - environment="production"
            - service="backend"
            - severity="warning"
          receiver: email-security

        - matchers:
            - severity="critical"
          receiver: pagerduty-critical

        - matchers:
            - severity="warning"
          receiver: email-security

    receivers:
      - name: slack-default
        slack_configs:
          - api_url: ${ALERT_SLACK_WEBHOOK_URL}
            channel: '#security-alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts -}}
              *Severity:* {{ .Labels.severity }}\n
              *Summary:* {{ .Annotations.summary }}\n
              *Description:* {{ .Annotations.description }}\n
              {{ end }}

      - name: email-security
        email_configs:
          - to: ${ALERT_EMAIL_TO}
            send_resolved: true
            headers:
              subject: '[{{ .Status | toUpper }}] Speedy Trucks {{ .CommonLabels.alertname }}'

      - name: pagerduty-critical
        pagerduty_configs:
          - routing_key: ${ALERT_PAGERDUTY_ROUTING_KEY}
            send_resolved: true
            severity: critical
            description: '{{ .CommonAnnotations.summary }}'
