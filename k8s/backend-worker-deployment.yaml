apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedy-trucks-worker
  labels:
    app: speedy-trucks-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speedy-trucks-worker
  template:
    metadata:
      labels:
        app: speedy-trucks-worker
    spec:
      containers:
        - name: worker
          image: ajay35247/codespaces-react-backend:latest
          imagePullPolicy: Always
          command: ["node", "src/worker.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              value: "mongodb://mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/speedy-trucks?replicaSet=rs0"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: speedy-trucks-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
