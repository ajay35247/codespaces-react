apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init-replica
spec:
  template:
    spec:
      containers:
        - name: mongo-init
          image: mongo:6.0
          command:
            - bash
            - -lc
            - |
              until mongo --host mongo-0.mongo-headless --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo-0.mongo-headless:27017"},{_id:1,host:"mongo-1.mongo-headless:27017"},{_id:2,host:"mongo-2.mongo-headless:27017"}]})'; do
                echo 'Waiting for mongo replica set...';
                sleep 5;
              done
      restartPolicy: OnFailure
