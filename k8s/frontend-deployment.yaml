apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedy-trucks-frontend
  labels:
    app: speedy-trucks-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speedy-trucks-frontend
  template:
    metadata:
      labels:
        app: speedy-trucks-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ajay35247/codespaces-react-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: VITE_API_URL
              value: "https://api.speedy-trucks.example.com/api"
            - name: VITE_GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: speedy-trucks-secrets
                  key: VITE_GOOGLE_MAPS_API_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: speedy-trucks-frontend
spec:
  type: ClusterIP
  selector:
    app: speedy-trucks-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
