apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: speedy-trucks-ingress-prod
  labels:
    app: speedy-trucks-ingress
    environment: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  tls:
    - hosts:
        - api.speedy-trucks.example.com
        - www.speedy-trucks.example.com
      secretName: speedy-trucks-tls
  rules:
    - host: www.speedy-trucks.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: speedy-trucks-frontend
                port:
                  number: 80
    - host: api.speedy-trucks.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: speedy-trucks-backend
                port:
                  number: 5000    - host: grafana.speedy-trucks.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000