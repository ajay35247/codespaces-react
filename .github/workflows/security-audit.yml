name: Security Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  app-security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run backend security suite
        run: npm --prefix backend run test:security

      - name: Frontend dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Backend dependency audit (high+)
        run: npm --prefix backend audit --audit-level=high

  secret-and-vuln-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  k8s-manifest-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kube-score
        run: |
          set -euo pipefail
          KS_VERSION="1.19.0"
          curl -sSL "https://github.com/zegl/kube-score/releases/download/v${KS_VERSION}/kube-score_${KS_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kube-score
          kube-score version

      - name: Run kube-score
        # Enforce genuine issues and ignore tests that don't apply to this
        # workload mix (dev/single-replica caches, jobs without probes, etc.).
        # Ignored tests and why:
        #   pod-networkpolicy / networkpolicy-targets-pod
        #     – NetworkPolicies live in network-policies.yaml + redis-*
        #       manifests; kube-score lint cannot cross-reference them.
        #   container-image-pull-policy / container-image-tag
        #     – Handled by the CI image pipeline, not the manifests.
        #   container-resources / container-ephemeral-storage-request-and-limit
        #     – Right-sizing is environment-specific; enforced via cluster
        #       defaults / LimitRanges at deploy time.
        #   pod-probes
        #     – Jobs, workers and observability sidecars legitimately don't
        #       need HTTP probes.
        #   container-security-context-user-group-id /
        #   container-security-context-readonlyrootfilesystem
        #     – Upstream images (grafana, prometheus, mongo) require root or
        #       a writable root FS; we harden our own images (redis) inline.
        #   deployment-has-poddisruptionbudget /
        #   statefulset-has-poddisruptionbudget
        #     – PDBs are defined where they matter (redis).
        #   ingress-targets-service
        #     – False positive: the target services are declared in sibling
        #       manifests which kube-score does not load.
        #   cronjob-has-deadline
        #     – Backup jobs intentionally run without a deadline.
        run: |
          set -euo pipefail
          shopt -s nullglob
          kube-score score k8s/*.yaml \
            --ignore-test pod-networkpolicy \
            --ignore-test networkpolicy-targets-pod \
            --ignore-test container-image-pull-policy \
            --ignore-test container-image-tag \
            --ignore-test container-resources \
            --ignore-test container-ephemeral-storage-request-and-limit \
            --ignore-test pod-probes \
            --ignore-test container-security-context-user-group-id \
            --ignore-test container-security-context-readonlyrootfilesystem \
            --ignore-test deployment-has-poddisruptionbudget \
            --ignore-test statefulset-has-poddisruptionbudget \
            --ignore-test ingress-targets-service \
            --ignore-test cronjob-has-deadline
