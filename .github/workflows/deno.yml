# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno

on:
  push:
    branches: ["main"]
    paths:
      - "deno.json"
      - "deno.jsonc"
      - "deno/**"
      - "scripts/deno/**"
  pull_request:
    branches: ["main"]
    paths:
      - "deno.json"
      - "deno.jsonc"
      - "deno/**"
      - "scripts/deno/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        # uses: denoland/setup-deno@v1
        uses: denoland/setup-deno@61fe2df320078202e33d7d5ad347e7dcfa0e8f31  # v1.1.2
        with:
          deno-version: v1.x

      # Uncomment this step to verify the use of 'deno fmt' on each commit.
      # - name: Verify formatting
      #   run: deno fmt --check

      - name: Run linter
        run: |
          TARGETS=""
          [ -d deno ] && TARGETS="$TARGETS deno"
          [ -d scripts/deno ] && TARGETS="$TARGETS scripts/deno"
          if [ -n "$TARGETS" ]; then
            deno lint $TARGETS
          else
            echo "No Deno source directories found; skipping lint."
          fi

      - name: Run tests
        run: |
          TARGETS=""
          [ -d deno ] && TARGETS="$TARGETS deno"
          [ -d scripts/deno ] && TARGETS="$TARGETS scripts/deno"
          if [ -n "$TARGETS" ]; then
            deno test -A $TARGETS
          else
            echo "No Deno source directories found; skipping tests."
          fi
