name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm

    - name: Install npm dependencies
      # NOTE: do NOT pass --no-optional. Rollup ships its Linux x64 native
      # binary (@rollup/rollup-linux-x64-gnu) as an optional dependency and
      # Vite's build will crash without it. Use npm ci for a reproducible
      # install from package-lock.json.
      run: npm ci --legacy-peer-deps

    - name: Build web app (skip tests)
      run: npm run build -- --mode=production 2>/dev/null || npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create required directories
      run: mkdir -p android/app/src/main/assets/public || true

    - name: Copy web assets to Android
      run: |
        if [ -d "dist" ]; then
          cp -r dist/* android/app/src/main/assets/public/ || cp -r dist android/app/src/main/assets/public
        else
          echo "dist directory not found"
          exit 1
        fi

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleDebug --no-daemon --info 2>&1 | tail -50

    - name: Check APK output
      run: |
        if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
        else
          echo "APK not found"
          find android -name "*.apk" 2>/dev/null
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: speedy-trucks-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30