name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm ci

    - name: Build web app
      run: npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33

    - name: Create Android directories
      run: mkdir -p android/app/src/main/assets/public

    - name: Copy built web assets
      run: cp -r dist/* android/app/src/main/assets/public/

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: speedy-trucks-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30