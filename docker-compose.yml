version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=https://api.speedy-trucks.example.com/api
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/speedy-trucks
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=https://www.speedy-trucks.example.com
      - FRONTEND_URL=https://www.speedy-trucks.example.com
      - JWT_SECRET=${JWT_SECRET}
      - USE_CLUSTER=true
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--save", "300", "10"]
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
